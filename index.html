<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<!-- ================= COVER ================= -->
<section id="cover">
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="content">
    <p class="top">UNDANGAN PERNIKAHAN</p>
    <p class="bismillah">Bismillahirrahmanirrahim</p>

    <p>Kepada Yth:</p>
    <h2 id="guestName">Tamu Undangan</h2>

    <h1 class="name">Subyan</h1>
    <div class="and">&</div>
    <h1 class="name">Desmawati</h1>

    <button id="openBtn">Buka Undangan</button>
  </div>
</section>

<!-- ================= MAIN ================= -->
<main id="mainContent">

  <section class="hero">
    <h1>Subyan & Desmawati</h1>
    <p>02 - 03 Mei 2026</p>
  </section>

  <section>
    <h2>Countdown</h2>
    <div id="timer"></div>
  </section>

  <section>
    <h2>Detail Acara</h2>
    <p>Akad: Sabtu, 02 Mei 2026 - 19:30 WIB</p>
    <p>Resepsi: Minggu, 03 Mei 2026 - 09:00 WIB</p>
  </section>

  <section>
    <h2>Lokasi</h2>
    <iframe 
      src="https://maps.google.com/maps?q=Desa%20Sungai%20Keruh%20Tebo&output=embed"
      width="100%" height="250" style="border:0;">
    </iframe>
  </section>

  <section>
    <h2>Galeri</h2>
    <img src="assets/gallery1.png" width="100%">
  </section>

  <section>
    <h2>RSVP</h2>
    <button id="waBtn">Kirim WhatsApp</button>
  </section>

</main>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
